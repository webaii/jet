<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ✅ FAVICON ADDED HERE -->
    <link rel="icon" type="image/png" href="./favicon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Affordable Flights & Smooth Air Travel | Easy Booking Online</title>

<meta name="description" content="Book affordable flights with flexible options and a smooth travel experience. Explore popular destinations with easy online booking and reliable service.">

    <style>
      :root {
        color-scheme: light dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        height: auto;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        overflow: auto;
        background: #0b0f1a;
      }

      body {
        background-image: url("./img/banner.webp");
        background-repeat: no-repeat;
        background-position: center center;
        background-size: cover;
        background-attachment: fixed;
        background-color: #0b0f1a;
        position: relative;
      }

      @supports (-webkit-touch-callout: none) {
        body {
          background-attachment: scroll;
        }
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 1;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image: url("./img/banner.webp");
        background-repeat: no-repeat;
        background-position: center center;
        background-size: cover;
      }

      body > * {
        position: relative;
        z-index: 2;
      }

      @media (max-width: 480px) {
        body {
          background-image: url("./img/mobile-banner.webp");
          background-position: top;
          background-size: contain;
          background-attachment: scroll;
        }

        body::after {
          background-image: url("./img/mobile-banner.webp");
          background-position: top;
          background-size: contain;
        }
      }

      .mto-backdrop {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999999;
      }

      .mto-modal {
        width: min(92vw, 380px);
        background: #ffffff;
        border-radius: 10px;
        box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6);
        overflow: hidden;
        position: relative;
        animation: popupShow 0.25s ease;
      }

      @keyframes popupShow {
        from {
          transform: translateY(10px) scale(0.97);
          opacity: 0.9;
        }
        to {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }

      .mto-head {
        background: #05164d;
        padding: 14px;
        text-align: center;
        position: relative;
      }

      .mto-title {
        color: #fff;
        font-size: 20px;
        font-weight: 800;
        margin: 0;
      }

      .mto-x {
        position: absolute;
        right: 10px;
        top: 6px;
        background: transparent;
        border: none;
        color: #fff;
        font-size: 22px;
        cursor: default;
        opacity: 0.6;
      }

      .mto-body {
        text-align: center;
        padding: 18px;
      }

      .mto-avatar {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        margin: auto;
        overflow: hidden;
        border: 4px solid #fff;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .mto-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .mto-sub {
        margin: 12px 0;
        font-weight: 600;
        color: #555;
      }

      .mto-phone {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        background: #05164d;
        color: #fff;
        font-size: 22px;
        font-weight: 900;
        padding: 14px;
        border-radius: 12px;
        text-decoration: none;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .mto-help {
        margin: 10px 0;
        font-weight: 700;
        color: #777;
      }

      .mto-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 10px;
      }

      .mto-btn {
        background: #05164d;
        color: #fff;
        font-weight: 800;
        padding: 12px;
        border-radius: 10px;
        text-decoration: none;
        text-align: center;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
      }

      .mto-foot {
        border-top: 1px solid #ddd;
        padding: 14px;
        text-align: center;
        font-weight: 800;
        font-size: 14px;
      }

      .mto-foot span {
        color: red;
      }
    </style>
